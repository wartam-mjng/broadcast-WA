<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Broadcast WhatsApp</title>

<style>

body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2{
  text-align:center;
}

input,
select,
textarea,
button{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  box-sizing:border-box;
}

textarea{
  min-height:150px;
}

#kontakList{
  border:1px solid #ddd;
  padding:10px;
  max-height:300px;
  overflow:auto;
}

.item{
  margin-bottom:5px;
}

button{
  cursor:pointer;
}

.info{
  font-weight:bold;
  margin-bottom:10px;
}

</style>

</head>

<body>

<h2>Broadcast WhatsApp</h2>

<label>Nama Pengirim</label> <input type="text" id="pengirim">

<label>Filter Grup</label> <select id="grup"></select>

<label>
<input type="checkbox" id="pilihSemua">
 Pilih Semua
</label>

<div class="info">
Jumlah Terpilih :
<span id="jumlah">0</span>
</div>

<div id="kontakList"></div>

<label>Template Pesan</label> <select id="template">

<option value="">-- Pilih Template --</option>
</select>

<label>Isi Pesan</label>

<textarea id="pesan"></textarea>

<button onclick="kirimPesan()">
Kirim Pesan
</button>

<script>

const API_URL =
'https://script.google.com/macros/s/AKfycbzHrmEKaeUJjW4a3AvW-HtpYFJykKuRfPvf7BIFfuY34DUh6AveDMGczFIatY8m74qE/exec';

let kontakData = [];
let templateData = [];

async function getJSON(url){

  const res =
    await fetch(url);

  return await res.json();

}

async function loadGroups(){

  const data =
    await getJSON(
      API_URL +
      '?action=getGroups'
    );

  const grup =
    document.getElementById(
      'grup'
    );

  grup.innerHTML =
    '<option value="">Semua Grup</option>';

  data.forEach(row=>{

    grup.innerHTML +=
      `<option value="${row[1]}">
        ${row[1]}
      </option>`;

  });

}

async function loadContacts(){

  const grup =
    document.getElementById(
      'grup'
    ).value;

  let url =
    API_URL +
    '?action=getContacts';

  if(grup){

    url +=
      '&group=' +
      encodeURIComponent(grup);

  }

  kontakData =
    await getJSON(url);

  renderContacts();

}

function renderContacts(){

  const div =
    document.getElementById(
      'kontakList'
    );

  div.innerHTML='';

  kontakData.forEach(item=>{

    div.innerHTML += `
      <div class="item">
      <label>
      <input
        type="checkbox"
        class="kontak"
        value="${item.id}">
      ${item.nama}
      (${item.nomor})
      </label>
      </div>
    `;

  });

  bindCheckbox();

}

function bindCheckbox(){

  document
    .querySelectorAll('.kontak')
    .forEach(cb=>{

      cb.addEventListener(
        'change',
        updateJumlah
      );

    });

}

function updateJumlah(){

  const total =
    document
      .querySelectorAll(
        '.kontak:checked'
      )
      .length;

  document
    .getElementById(
      'jumlah'
    )
    .innerText = total;

}

document
  .getElementById(
    'pilihSemua'
  )
  .addEventListener(
    'change',
    function(){

      document
        .querySelectorAll(
          '.kontak'
        )
        .forEach(cb=>{

          cb.checked =
            this.checked;

        });

      updateJumlah();

    }
  );

async function loadTemplates(){

  templateData =
    await getJSON(
      API_URL +
      '?action=getTemplates'
    );

  const select =
    document.getElementById(
      'template'
    );

  templateData.forEach(t=>{

    select.innerHTML += `
      <option value="${t.id}">
      ${t.nama}
      </option>
    `;

  });

}

document
  .getElementById(
    'template'
  )
  .addEventListener(
    'change',
    function(){

      const data =
        templateData.find(
          x =>
          String(x.id) ===
          this.value
        );

      if(data){

        document
          .getElementById(
            'pesan'
          )
          .value =
          data.isi;

      }

    });

document
  .getElementById(
    'grup'
  )
  .addEventListener(
    'change',
    loadContacts
  );

async function kirimPesan(){

  const pengirim =
    document
      .getElementById(
        'pengirim'
      )
      .value;

  const pesan =
    document
      .getElementById(
        'pesan'
      )
      .value;

  const ids =
    Array.from(
      document
        .querySelectorAll(
          '.kontak:checked'
        )
    ).map(
      cb => Number(cb.value)
    );

  const kontak =
    kontakData.filter(
      x =>
      ids.includes(x.id)
    );

  if(kontak.length === 0){

    alert(
      'Pilih penerima'
    );

    return;

  }

  const body = {

    action:
      'sendMessage',

    pengirim:
      pengirim,

    pesan:
      pesan,

    kontak:
      kontak

  };

  const res =
    await fetch(
      API_URL,
      {

        method:'POST',

        headers:{
          'Content-Type':
          'application/json'
        },

        body:
          JSON.stringify(
            body
          )

      }
    );

  const result =
    await res.json();

  alert(
    'Berhasil : ' +
    result.berhasil +
    '\nGagal : ' +
    result.gagal
  );

}

loadGroups();
loadContacts();
loadTemplates();

</script>

</body>
</html>
